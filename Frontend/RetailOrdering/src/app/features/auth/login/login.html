<section class="auth-page py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="card shadow-sm border-0 auth-card">
          <div class="card-body p-5">
            <h2 class="mb-3 fw-bold">Login</h2>
            <p class="text-muted mb-4">Secure access with JWT and a fast mobile-first login experience.</p>

            <form [formGroup]="loginForm" (ngSubmit)="submit()" novalidate>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" formControlName="email" placeholder="you@example.com" />
                <div class="form-text text-danger" *ngIf="email?.invalid && (email?.touched || email?.dirty)">
                  <span *ngIf="email?.errors?.['required']">Email is required.</span>
                  <span *ngIf="email?.errors?.['email']">Enter a valid email address.</span>
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" formControlName="password" placeholder="Password" />
                <div class="form-text text-danger" *ngIf="password?.invalid && (password?.touched || password?.dirty)">
                  <span *ngIf="password?.errors?.['required']">Password is required.</span>
                  <span *ngIf="password?.errors?.['minlength']">Minimum 6 characters required.</span>
                </div>
              </div>

              <button class="btn btn-primary w-100 mb-3" type="submit">Login</button>
            </form>

            <div class="text-center text-muted">
              New to FoodOrder? <a routerLink="/auth/register">Create an account</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
