<section class="home-hero py-5 text-center text-md-start">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-lg-6">
        <p class="text-primary fw-semibold mb-2">Retail Ordering</p>
        <h1 class="display-5 fw-bold mb-3">Welcome back, {{ displayName }}.</h1>
        <p class="lead text-muted mb-4">Your ordering experience is ready. Manage orders, checkout securely, and track deliveries from one place.</p>
        <div class="btn-group btn-group-lg" role="group">
          <a routerLink="/auth/login" class="btn btn-primary">Order Now</a>
          <a routerLink="/auth/register" class="btn btn-outline-secondary">Create account</a>
        </div>
      </div>
      <div class="col-lg-6 text-center mt-4 mt-lg-0">
        <div class="hero-card p-4 shadow-sm bg-white rounded-4">
          <div class="hero-placeholder"></div>
          <p class="mt-3 text-muted">Fast checkout, real-time order status, and secure payment flow.</p>
          <div *ngIf="isAdmin" class="badge bg-success text-white mt-3">Admin access available</div>
        </div>
      </div>
    </div>
  </div>
</section>
