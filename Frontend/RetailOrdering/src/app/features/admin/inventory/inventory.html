<div class="card shadow-sm border-0">
  <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center">
    <h6 class="mb-0">Inventory</h6>
    <span class="text-muted small">Adjust stock counts for active products.</span>
  </div>
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-light">
        <tr>
          <th>Product</th>
          <th>Stock Qty</th>
          <th class="text-end">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of inventory()">
          <td>{{ item.name || 'Product #' + item.productId }}</td>
          <td>
            <input
              type="number"
              class="form-control form-control-sm"
              [(ngModel)]="stockMap[item.productId]"
            />
          </td>
          <td class="text-end">
            <button class="btn btn-sm btn-primary" (click)="saveStock(item)">Save</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
