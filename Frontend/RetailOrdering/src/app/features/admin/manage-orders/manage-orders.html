<div class="card shadow-sm border-0">
  <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center">
    <h6 class="mb-0">Manage Orders</h6>
    <span class="text-muted small">Update order status and review order totals.</span>
  </div>
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-light">
        <tr>
          <th>Order</th>
          <th>Status</th>
          <th>Total</th>
          <th class="text-end">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let order of orders()">
          <td>#{{ order.orderId }}</td>
          <td><span [class]="getStatusClass(order.status)">{{ order.status }}</span></td>
          <td>${{ order.totalAmount.toFixed(2) }}</td>
          <td class="text-end">
            <div class="btn-group" role="group" aria-label="Status actions">
              <button *ngFor="let status of statuses" type="button" class="btn btn-sm btn-outline-secondary" (click)="updateStatus(order, status)">{{ status }}</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
