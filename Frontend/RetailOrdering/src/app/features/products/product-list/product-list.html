<section class="container py-4">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3 mb-4">
    <div>
      <h1 class="h3 mb-1">Food Marketplace</h1>
      <p class="text-muted mb-0">Browse dishes, filter by category or brand, and add your favorites to the cart.</p>
    </div>
    <a routerLink="/cart" class="btn btn-outline-primary btn-sm">View Cart</a>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-12 col-lg-4">
      <div class="mb-3">
        <label class="form-label">Search</label>
        <input class="form-control" [formControl]="searchControl" placeholder="Search products" />
      </div>
      <app-category-filter
        [categories]="(categories$ | async) || []"
        [activeCategory]="categoryControl.value"
        (categoryChange)="onCategoryChange($event)">
      </app-category-filter>
      <app-brand-filter
        class="mt-3"
        [brands]="(brands$ | async) || []"
        [activeBrand]="brandControl.value"
        (brandChange)="onBrandChange($event)">
      </app-brand-filter>
    </div>

    <div class="col-12 col-lg-8">
      <div *ngIf="loading()" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
      </div>
      <div *ngIf="!(loading())" class="row row-cols-1 row-cols-sm-2 g-3">
        <ng-container *ngIf="(products$ | async) as products">
          <ng-container *ngIf="products.length; else emptyState">
            <div class="col" *ngFor="let product of products">
              <app-product-card [product]="product" (addToCart)="onAddToCart($event)"></app-product-card>
            </div>
          </ng-container>
        </ng-container>
      </div>
      <ng-template #emptyState>
        <div class="alert alert-warning mb-0">No products match your search or filter. Try another keyword.</div>
      </ng-template>
    </div>
  </div>
</section>
