<div class="app-shell d-flex flex-column min-vh-100">
  <app-navbar></app-navbar>

  <main class="page-content flex-grow-1">
    <router-outlet></router-outlet>
  </main>

  <app-footer></app-footer>

  <div *ngIf="loading$ | async" class="loading-overlay d-flex align-items-center justify-content-center">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div *ngFor="let toast of toasts | async" class="toast-card alert alert-{{ toast.type }} shadow-sm mb-2" role="alert">
      <div class="d-flex align-items-start justify-content-between">
        <div>
          <strong class="d-block">{{ toast.title }}</strong>
          <div class="small">{{ toast.message }}</div>
        </div>
        <button type="button" class="btn-close" aria-label="Close" (click)="toastService.dismiss(toast.id)"></button>
      </div>
    </div>
  </div>
</div>
